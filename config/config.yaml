# OpenAI Configuration
openai:
  api_key: ${OPENAI_API_KEY}
  model: gpt-4o
  temperature: 0.1
  max_retries: 3

# Playwright Configuration
playwright:
  timeout: 30000  # milliseconds
  headless: true
  browser: chromium  # chromium, firefox, webkit
  
# Logging Configuration
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR
  file: logs/autonomous-qa.log
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'

# Test Execution Configuration
test_execution:
  grid_size: 4  # Concurrent test execution
  max_duration: 3600  # seconds
  
# Database Configuration
database:
  chromadb_path: ./data/chromadb
  persist_dir: ./data/persist

# FastAPI Configuration
api:
  host: 0.0.0.0
  port: 8000
  reload: true
  log_level: info
  cors_enabled: true
  cors_origins:
    - "*"
  rate_limit:
    requests: 100
    period: 3600  # seconds

# Agent Configuration
agents:
  test_plan:
    model: gpt-4o
    temperature: 0.1
    max_retries: 3
  test_generation:
    model: gpt-4o
    temperature: 0.1
    max_retries: 3
  rca:
    model: gpt-4o
    temperature: 0.1
    max_retries: 3