[tox]
envlist = py311, py312, lint, type, format
skip_missing_interpreters = true

[testenv]
deps = -r requirements/requirements-dev.txt
commands =
    pytest tests/ -v --cov=agents,tools,orchestration --cov-report=html --cov-report=term
setenv =
    PYTHONPATH = {toxinidir}

[testenv:lint]
deps = flake8
commands = flake8 agents/ tools/ orchestration/ api/ evaluation/ examples/

[testenv:type]
deps = mypy
commands = mypy agents/ tools/ orchestration/ api/ evaluation/

[testenv:format]
deps = black, isort
commands =
    black agents/ tools/ orchestration/ api/ evaluation/ examples/
    isort agents/ tools/ orchestration/ api/ evaluation/ examples/

[testenv:docs]
deps = sphinx, sphinx-rtd-theme
commands = sphinx-build -b html docs/ docs/_build/html

[testenv:clean]
deps =
commands =
    rm -rf .tox
    rm -rf htmlcov
    rm -rf .coverage
    rm -rf .mypy_cache
    rm -rf .pytest_cache
    find . -name "*.pyc" -delete
    find . -name "__pycache__" -type d -exec rm -rf {} +